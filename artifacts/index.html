<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FocusList — Design Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#141A22",
            slate: "#4B5563",
            mist: "#F6F7FA",
            snow: "#FFFFFF",
            mint: "#14B8A6",
            mintDeep: "#0F766E",
            border: "#E5E7EB"
          },
          fontFamily: {
            sans: ["Inter", "sans-serif"],
            display: ["Manrope", "sans-serif"]
          },
          borderRadius: {
            card: "14px"
          },
          boxShadow: {
            soft: "0 8px 20px rgba(16, 24, 40, 0.08)"
          }
        }
      }
    };
  </script>
</head>
<body class="bg-mist text-ink font-sans">
  <main class="mx-auto w-full max-w-4xl px-6 py-10">
    <header class="rounded-card border border-border bg-snow p-6 shadow-soft">
      <div class="flex items-start justify-between gap-6">
        <div>
          <h1 class="font-display text-3xl">FocusList — Hi-Fi Screens</h1>
          <p class="mt-2 text-sm text-slate">Navigation hub for the single-screen todo app experience.</p>
        </div>
        <div class="h-12 w-1.5 rounded-full bg-mint"></div>
      </div>
    </header>

    <section class="mt-8 space-y-4">
      <h2 class="font-display text-lg">MVP</h2>
      <div class="rounded-card border border-border bg-snow p-5 shadow-soft">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <div>
            <p class="font-semibold">Todo Main</p>
            <p class="text-sm text-slate">Core workspace for creating, managing, and completing tasks.</p>
          </div>
          <a class="rounded-full bg-mint px-4 py-2 text-sm font-semibold text-white shadow-soft transition hover:bg-mintDeep" href="todo-main.html">Open screen</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
