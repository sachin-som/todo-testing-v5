<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Wireframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .wire-box {
        background-color: rgb(229 229 229);
        background-image:
          linear-gradient(to top right, transparent calc(50% - 1px), rgb(163 163 163), transparent calc(50% + 1px)),
          linear-gradient(to bottom right, transparent calc(50% - 1px), rgb(163 163 163), transparent calc(50% + 1px));
      }
    </style>
  </head>
  <body class="m-0 bg-neutral-100 font-sans text-neutral-900">
    <!-- Assumption: single-screen wireframe for the main todo flow; no sitemap file was available. -->
    <div class="mx-auto min-h-screen max-w-7xl bg-neutral-100 px-6 py-6 md:px-10" data-sitemap="/todo/main" data-req="FR-001 FR-011">
      <header class="border-b border-neutral-300 pb-6" data-req="FR-011 NFR-PRIV-1">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="flex items-center gap-4">
            <div class="h-12 w-12 border border-neutral-400 bg-neutral-200"></div>
            <div>
              <h1 class="text-2xl font-bold">Page Title</h1>
              <div class="mt-2 h-3 w-48 bg-neutral-200"></div>
            </div>
          </div>

          <div class="flex flex-wrap items-center gap-3 text-sm font-bold">
            <a href="#create" class="rounded border border-neutral-400 px-4 py-2">Create</a>
            <a href="#list" class="rounded border border-neutral-400 px-4 py-2">List</a>
            <a href="#privacy" class="rounded border border-neutral-400 px-4 py-2">Privacy</a>
          </div>
        </div>
      </header>

      <main class="space-y-8 py-8">
        <section id="create" class="border-b border-neutral-300 pb-8" data-req="FR-001 FR-002">
          <h2 class="mb-5 text-2xl font-bold">Create Task</h2>
          <form class="grid gap-6 lg:grid-cols-[1.4fr_0.9fr]">
            <div class="space-y-4">
              <label class="block text-sm font-medium" for="title">Title</label>
              <input id="title" type="text" class="h-12 w-full border border-neutral-400 bg-white px-4 outline-none" placeholder="Field" />
              <div class="h-3 w-40 bg-neutral-200"></div>

              <div class="grid gap-4 md:grid-cols-2">
                <div>
                  <label class="block text-sm font-medium" for="due">Due Date</label>
                  <input id="due" type="date" class="mt-2 h-12 w-full border border-neutral-400 bg-white px-4 outline-none" />
                </div>
                <div>
                  <label class="block text-sm font-medium" for="priority">Priority</label>
                  <select id="priority" class="mt-2 h-12 w-full border border-neutral-400 bg-white px-4 outline-none">
                    <option>Dropdown</option>
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium" for="tags">Tags</label>
                <input id="tags" type="text" class="mt-2 h-12 w-full border border-neutral-400 bg-white px-4 outline-none" placeholder="Field" />
              </div>
            </div>

            <aside class="space-y-4" aria-label="Create actions">
              <div class="wire-box aspect-[4/3] border border-neutral-400"></div>
              <div class="flex gap-3">
                <button type="button" class="flex-1 rounded border border-neutral-500 bg-neutral-500 px-4 py-3 text-sm font-bold text-neutral-50">Primary Action</button>
                <button type="button" class="flex-1 rounded border border-neutral-400 bg-neutral-200 px-4 py-3 text-sm font-bold text-neutral-900">Secondary Action</button>
              </div>
              <div class="rounded border border-dashed border-neutral-400 p-3 text-sm" data-req="FR-002">Validation</div>
            </aside>
          </form>
        </section>

        <section id="controls" class="border-b border-neutral-300 pb-8" data-req="FR-008 FR-009">
          <h2 class="mb-5 text-2xl font-bold">Filters</h2>
          <div class="grid gap-4 lg:grid-cols-[1fr_1fr_1fr]">
            <div>
              <label class="block text-sm font-medium" for="status">Status</label>
              <select id="status" class="mt-2 h-12 w-full border border-neutral-400 bg-white px-4 outline-none">
                <option>All</option>
                <option>Active</option>
                <option>Completed</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium" for="sort">Sort</label>
              <select id="sort" class="mt-2 h-12 w-full border border-neutral-400 bg-white px-4 outline-none">
                <option>Due Date</option>
                <option>Priority</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium">Tag Filter</label>
              <div class="mt-2 flex flex-wrap gap-2">
                <label class="rounded border border-neutral-400 px-3 py-2 text-sm"><input type="checkbox" class="mr-2" />Tag</label>
                <label class="rounded border border-neutral-400 px-3 py-2 text-sm"><input type="checkbox" class="mr-2" />Tag</label>
                <label class="rounded border border-neutral-400 px-3 py-2 text-sm"><input type="checkbox" class="mr-2" />Tag</label>
              </div>
            </div>
          </div>
        </section>

        <section id="list" class="border-b border-neutral-300 pb-8" data-req="FR-003 FR-004 FR-005 FR-006">
          <div class="mb-5 flex items-center justify-between gap-4">
            <h2 class="text-2xl font-bold">Task List</h2>
            <div class="flex gap-2 text-sm font-bold">
              <button type="button" class="rounded border border-neutral-400 px-3 py-2">Active</button>
              <button type="button" class="rounded border border-neutral-400 px-3 py-2">Completed</button>
            </div>
          </div>

          <div class="grid gap-5 lg:grid-cols-3">
            <article class="border border-neutral-400 bg-white p-4" data-req="FR-003 FR-005">
              <div class="mb-3 flex items-center justify-between">
                <label class="flex items-center gap-2 text-sm font-medium"><input type="checkbox" class="h-5 w-5" />Active</label>
                <span class="text-sm font-medium">Priority</span>
              </div>
              <div class="wire-box mb-4 aspect-[5/3] border border-neutral-400"></div>
              <div class="mb-2 h-3 w-2/3 bg-neutral-200"></div>
              <div class="mb-4 h-3 w-1/2 bg-neutral-200"></div>
              <div class="flex gap-2">
                <button type="button" class="flex-1 rounded border border-neutral-500 bg-neutral-500 px-3 py-2 text-sm font-bold text-neutral-50">Edit</button>
                <button type="button" class="flex-1 rounded border border-neutral-400 bg-neutral-200 px-3 py-2 text-sm font-bold">Delete</button>
              </div>
            </article>

            <article class="border border-neutral-400 bg-neutral-50 p-4" data-req="FR-003 FR-004 FR-005 FR-006">
              <div class="mb-3 flex items-center justify-between">
                <label class="flex items-center gap-2 text-sm font-medium"><input type="checkbox" checked class="h-5 w-5" />Completed</label>
                <span class="text-sm font-medium">Priority</span>
              </div>
              <div class="wire-box mb-4 aspect-[5/3] border border-neutral-400"></div>
              <div class="mb-2 h-3 w-2/3 bg-neutral-200"></div>
              <div class="mb-4 h-3 w-1/2 bg-neutral-200"></div>
              <div class="flex gap-2">
                <button type="button" class="flex-1 rounded border border-neutral-500 bg-neutral-500 px-3 py-2 text-sm font-bold text-neutral-50">Edit</button>
                <button type="button" class="flex-1 rounded border border-neutral-400 bg-neutral-200 px-3 py-2 text-sm font-bold">Delete</button>
              </div>
            </article>

            <article class="border border-neutral-400 bg-white p-4" data-req="FR-003 FR-004 FR-005 FR-006">
              <div class="mb-3 flex items-center justify-between">
                <label class="flex items-center gap-2 text-sm font-medium"><input type="checkbox" class="h-5 w-5" />Active</label>
                <span class="text-sm font-medium">Priority</span>
              </div>
              <div class="wire-box mb-4 aspect-[5/3] border border-neutral-400"></div>
              <div class="mb-2 h-3 w-2/3 bg-neutral-200"></div>
              <div class="mb-4 h-3 w-1/2 bg-neutral-200"></div>
              <div class="flex gap-2">
                <button type="button" class="flex-1 rounded border border-neutral-500 bg-neutral-500 px-3 py-2 text-sm font-bold text-neutral-50">Edit</button>
                <button type="button" class="flex-1 rounded border border-neutral-400 bg-neutral-200 px-3 py-2 text-sm font-bold">Delete</button>
              </div>
            </article>
          </div>
        </section>

        <section id="states" class="border-b border-neutral-300 pb-8" data-req="US-002 FR-007">
          <h2 class="mb-5 text-2xl font-bold">States</h2>
          <div class="grid gap-4 lg:grid-cols-3">
            <div class="border border-neutral-400 p-4">
              <h3 class="mb-3 text-base font-bold">Empty</h3>
              <div class="wire-box mb-4 aspect-[4/3] border border-neutral-400"></div>
              <div class="h-3 w-2/3 bg-neutral-200"></div>
            </div>
            <div class="border border-neutral-400 p-4">
              <h3 class="mb-3 text-base font-bold">Error</h3>
              <div class="wire-box mb-4 aspect-[4/3] border border-neutral-400"></div>
              <div class="h-3 w-2/3 bg-neutral-200"></div>
            </div>
            <div class="border border-neutral-400 p-4">
              <h3 class="mb-3 text-base font-bold">Confirm</h3>
              <div class="wire-box mb-4 aspect-[4/3] border border-neutral-400"></div>
              <div class="h-3 w-2/3 bg-neutral-200"></div>
            </div>
          </div>
        </section>

        <section id="privacy" data-req="FR-007 FR-011 NFR-SEC-3 NFR-PRIV-1 NFR-PRIV-2">
          <h2 class="mb-5 text-2xl font-bold">Privacy</h2>
          <div class="grid gap-4 lg:grid-cols-[1.2fr_0.8fr]">
            <div class="border border-neutral-400 p-5">
              <div class="h-3 w-3/4 bg-neutral-200"></div>
              <div class="mt-4 h-3 w-1/2 bg-neutral-200"></div>
              <div class="mt-4 h-3 w-5/6 bg-neutral-200"></div>
            </div>
            <div class="border border-neutral-400 p-5">
              <div class="wire-box aspect-[4/3] border border-neutral-400"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
