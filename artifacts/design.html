<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Wireframe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .wire-box {
        background-color: rgb(229 229 229);
        background-image:
          linear-gradient(to top right, transparent calc(50% - 1px), rgb(163 163 163), transparent calc(50% + 1px)),
          linear-gradient(to bottom right, transparent calc(50% - 1px), rgb(163 163 163), transparent calc(50% + 1px));
      }
    </style>
  </head>
  <body class="m-0 bg-neutral-100 font-sans text-neutral-900">
    <div class="mx-auto min-h-screen max-w-6xl px-6 py-8 md:px-10" data-sitemap="/todo/main-screen">
      <!-- Assumption: single-screen web app; sitemap inferred from BRD main todo flow. -->
      <header class="border border-neutral-400 bg-neutral-100 p-5" data-req="FR-003 FR-007 FR-011">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div class="flex items-center gap-4">
            <div class="h-12 w-12 border border-neutral-400 bg-neutral-200"></div>
            <div>
              <div class="h-4 w-28 bg-neutral-200"></div>
              <div class="mt-2 h-3 w-40 bg-neutral-200"></div>
            </div>
          </div>
          <div class="flex gap-3">
            <button type="button" class="h-11 rounded border border-neutral-500 bg-neutral-500 px-5 text-sm font-bold text-neutral-50" data-req="FR-007">Primary Action</button>
            <button type="button" class="h-11 rounded border border-neutral-400 bg-neutral-200 px-5 text-sm font-bold text-neutral-900" data-req="FR-011">Secondary Action</button>
          </div>
        </div>
      </header>

      <main class="mt-6 space-y-6">
        <section class="border border-neutral-400 bg-neutral-100 p-5" id="create" data-req="FR-001 FR-002 FR-010">
          <h1 class="text-2xl font-bold">Main Screen</h1>
          <div class="mt-5 grid gap-4 lg:grid-cols-[1.2fr_0.8fr]">
            <form class="space-y-4 border border-neutral-400 bg-neutral-100 p-4" data-req="FR-001 FR-002">
              <div>
                <label class="mb-2 block text-sm font-bold" for="task-title">Field</label>
                <input id="task-title" type="text" class="h-11 w-full border border-neutral-400 bg-white px-3 text-sm outline-none" placeholder="Input" />
              </div>
              <div class="grid gap-4 md:grid-cols-3">
                <div>
                  <label class="mb-2 block text-sm font-bold" for="task-date">Field</label>
                  <input id="task-date" type="date" class="h-11 w-full border border-neutral-400 bg-white px-3 text-sm outline-none" />
                </div>
                <div>
                  <label class="mb-2 block text-sm font-bold" for="task-priority">Dropdown</label>
                  <select id="task-priority" class="h-11 w-full border border-neutral-400 bg-white px-3 text-sm outline-none">
                    <option>Option</option>
                  </select>
                </div>
                <div>
                  <label class="mb-2 block text-sm font-bold" for="task-tags">Field</label>
                  <input id="task-tags" type="text" class="h-11 w-full border border-neutral-400 bg-white px-3 text-sm outline-none" placeholder="Input" />
                </div>
              </div>
              <div class="flex gap-3">
                <button type="button" class="h-11 rounded border border-neutral-500 bg-neutral-500 px-5 text-sm font-bold text-neutral-50">Primary Action</button>
                <button type="button" class="h-11 rounded border border-neutral-400 bg-neutral-200 px-5 text-sm font-bold text-neutral-900">Secondary Action</button>
              </div>
              <div class="border border-dashed border-neutral-400 bg-neutral-100 p-3 text-sm text-neutral-500">Inline validation</div>
            </form>

            <aside class="space-y-4 border border-neutral-400 bg-neutral-100 p-4" data-req="FR-008 FR-009 FR-010 FR-011">
              <div>
                <div class="mb-3 h-4 w-28 bg-neutral-200"></div>
                <div class="grid grid-cols-2 gap-3 text-sm font-medium">
                  <label class="flex items-center gap-2"><input type="radio" name="status" /> All</label>
                  <label class="flex items-center gap-2"><input type="radio" name="status" /> Active</label>
                  <label class="flex items-center gap-2"><input type="radio" name="status" /> Completed</label>
                  <label class="flex items-center gap-2"><input type="checkbox" /> Tag</label>
                </div>
              </div>
              <div>
                <div class="mb-3 h-4 w-24 bg-neutral-200"></div>
                <div class="space-y-2">
                  <div class="h-10 border border-neutral-400 bg-neutral-200"></div>
                  <div class="h-10 border border-neutral-400 bg-neutral-200"></div>
                </div>
              </div>
            </aside>
          </div>
        </section>

        <section class="border border-neutral-400 bg-neutral-100 p-5" id="list" data-req="FR-003 FR-005 FR-006 FR-007 FR-008 FR-009">
          <div class="flex items-center justify-between gap-4">
            <h2 class="text-2xl font-bold">Task List</h2>
            <div class="flex gap-2">
              <button type="button" class="h-10 rounded border border-neutral-400 bg-neutral-200 px-4 text-sm font-bold">Filter</button>
              <button type="button" class="h-10 rounded border border-neutral-400 bg-neutral-200 px-4 text-sm font-bold">Sort</button>
            </div>
          </div>

          <div class="mt-5 space-y-4">
            <article class="grid gap-4 border border-neutral-400 bg-neutral-100 p-4 md:grid-cols-[28px_1fr_auto]">
              <input type="checkbox" class="mt-2 h-5 w-5 border border-neutral-400" />
              <div class="space-y-2">
                <div class="h-4 w-40 bg-neutral-200"></div>
                <div class="grid gap-2 sm:grid-cols-4">
                  <div class="h-3 bg-neutral-200"></div>
                  <div class="h-3 bg-neutral-200"></div>
                  <div class="h-3 bg-neutral-200"></div>
                  <div class="h-3 bg-neutral-200"></div>
                </div>
              </div>
              <div class="flex flex-wrap gap-2 md:justify-end">
                <button type="button" class="h-10 rounded border border-neutral-500 bg-neutral-500 px-4 text-sm font-bold text-neutral-50">Primary Action</button>
                <button type="button" class="h-10 rounded border border-neutral-400 bg-neutral-200 px-4 text-sm font-bold text-neutral-900">Secondary Action</button>
              </div>
            </article>

            <article class="grid gap-4 border border-neutral-400 bg-neutral-100 p-4 md:grid-cols-[28px_1fr_auto]" data-req="FR-005 FR-006">
              <input type="checkbox" class="mt-2 h-5 w-5 border border-neutral-400" />
              <div class="space-y-2">
                <div class="h-4 w-32 bg-neutral-200"></div>
                <div class="grid gap-2 sm:grid-cols-4">
                  <div class="h-3 bg-neutral-200"></div>
                  <div class="h-3 bg-neutral-200"></div>
                  <div class="h-3 bg-neutral-200"></div>
                  <div class="h-3 bg-neutral-200"></div>
                </div>
              </div>
              <div class="flex flex-wrap gap-2 md:justify-end">
                <button type="button" class="h-10 rounded border border-neutral-500 bg-neutral-500 px-4 text-sm font-bold text-neutral-50">Primary Action</button>
                <button type="button" class="h-10 rounded border border-neutral-400 bg-neutral-200 px-4 text-sm font-bold text-neutral-900">Secondary Action</button>
              </div>
            </article>
          </div>
        </section>

        <section class="border border-neutral-400 bg-neutral-100 p-5" id="storage" data-req="FR-007 FR-011">
          <h2 class="text-2xl font-bold">Storage State</h2>
          <div class="mt-5 grid gap-4 md:grid-cols-3">
            <div class="border border-neutral-400 bg-neutral-200 p-4">
              <div class="h-4 w-24 bg-neutral-100"></div>
              <div class="mt-3 h-24 wire-box border border-neutral-400"></div>
            </div>
            <div class="border border-neutral-400 bg-neutral-200 p-4">
              <div class="h-4 w-24 bg-neutral-100"></div>
              <div class="mt-3 h-24 wire-box border border-neutral-400"></div>
            </div>
            <div class="border border-neutral-400 bg-neutral-200 p-4">
              <div class="h-4 w-24 bg-neutral-100"></div>
              <div class="mt-3 h-24 wire-box border border-neutral-400"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
