name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt_validate:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Read Terraform version
        id: tf-version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf-version.outputs.version }}
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Diagnostics (failure)
        if: failure()
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Repo root ==="
          ls -la "$GITHUB_WORKSPACE"
          echo "=== Terraform dir ==="
          ls -la
          echo "=== Terraform version ==="
          terraform version || true

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [fmt_validate]
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    strategy:
      matrix:
        include:
          - env: dev
            var_file: dev.tfvars
          - env: prod
            var_file: prod.tfvars
    defaults:
      run:
        working-directory: infra/terraform
    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "0"
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Read Terraform version
        id: tf-version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf-version.outputs.version }}
          terraform_wrapper: false

      - name: Check ARM credentials
        id: arm-check
        run: |
          if [ -n "$ARM_CLIENT_ID" ] && [ -n "$ARM_CLIENT_SECRET" ] && [ -n "$ARM_TENANT_ID" ] && [ -n "$ARM_SUBSCRIPTION_ID" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Missing ARM secrets; skipping terraform plan." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Terraform init (no backend)
        if: ${{ steps.arm-check.outputs.has_secrets == 'true' }}
        run: terraform init -backend=false

      - name: Terraform plan
        if: ${{ steps.arm-check.outputs.has_secrets == 'true' }}
        run: terraform plan -var-file=${{ matrix.var_file }} -no-color

      - name: Diagnostics (failure)
        if: failure()
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Repo root ==="
          ls -la "$GITHUB_WORKSPACE"
          echo "=== Terraform dir ==="
          ls -la
          echo "=== Terraform version ==="
          terraform version || true
